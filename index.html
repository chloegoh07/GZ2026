<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Tracker</title>
</head>
<body>
    <h1>Bill Tracker</h1>
    <div id="billTo">
        <h2>Bill To</h2>
        <input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> Select All
        <ul id="billsList">
            <!-- Bills will be populated here -->
        </ul>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/1.35.6/supabase.min.js"></script>
    <script>
        // Supabase initialization
        const { createClient } = supabase;
        const supabaseUrl = 'https://your-supabase-project-url.supabase.co';
        const supabaseKey = 'your-supabase-anon-key';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Function to load bills from Supabase
        async function loadBills() {
            const { data, error } = await supabase
                .from('bills')
                .select('*');
            if (error) console.error('Error loading bills:', error);
            else populateBills(data);
        }

        function populateBills(bills) {
            const billsList = document.getElementById('billsList');
            billsList.innerHTML = '';
            bills.forEach(bill => {
                const li = document.createElement('li');
                li.textContent = bill.name;
                billsList.appendChild(li);
            });
        }

        function toggleSelectAll() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const billCheckboxes = document.querySelectorAll('#billsList input[type="checkbox"]');
            billCheckboxes.forEach(checkbox => checkbox.checked = selectAllCheckbox.checked);
        }

        // Load bills when the page is ready
        window.onload = loadBills;
        // Additional functionality can go here, including localStorage backup as needed
    </script>
</body>
</html>
