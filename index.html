<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Bill Splitter</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  padding: 20px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 360px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}
.checkbox-group label {
  display: flex;
  align-items: center;
  font-size: 14px;
  margin-bottom: 6px;
}
.checkbox-group input {
  margin-right: 10px;
}
button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border-radius: 10px;
}
.section {
  margin-top: 16px;
}
#feedback {
  color: green;
  margin-top: 8px;
}
</style>
</head>
<body>
<div class="card">
<h2>💸 Live Split</h2>

<input id="amount" placeholder="Amount SGD" type="number">
<input id="title" placeholder="Bill title">

<select id="payer"></select>

<div class="checkbox-group" id="group"></div>

<div class="checkbox-group">
  <label><input type="checkbox" id="exclude">Exclude payer from split</label>
</div>

<button onclick="addBill()">Add Bill</button>
<div id="feedback"></div>

<div class="section" id="balances"></div>
<div class="section" id="settle"></div>

<script>
// 🔥 Supabase keys (added)
const SUPABASE_URL = "https://wwcnhaummenjhpmndwoq.supabase.co";
const SUPABASE_KEY = "sb_publishable_-Cb0_t8Bzu4y0e0xWYF1oA_-Jwa7b80";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Friends list
const people = ["Josh","Chloe","CK","Janice","Travis","Rach","Emma","Weng"];
let balances = {};
people.forEach(p => balances[p] = 0);

// Initialize UI
document.getElementById("payer").innerHTML =
  people.map(p => `<option>${p}</option>`).join("");

document.getElementById("group").innerHTML =
  people.map(p => `<label><input type="checkbox" value="${p}">${p}</label>`).join("");

// Add a bill
async function addBill() {
  const amount = parseFloat(document.getElementById("amount").value);
  const title = document.getElementById("title").value || "Untitled";
  const payer = document.getElementById("payer").value;
  const exclude = document.getElementById("exclude").checked;

  const selected = Array.from(document.querySelectorAll('#group input:checked'))
    .map(cb => cb.value);

  let group = exclude ? selected.filter(p => p !== payer) : selected;

  if (!amount || group.length === 0) {
    alert("Please enter amount and select at least one person to bill.");
    return;
  }

  try {
    await db.from("bills").insert([{
      title,
      payer,
      amount,
      split_group: JSON.stringify(group)
    }]);

    // ✅ Feedback message
    const feedback = document.getElementById("feedback");
    feedback.innerText = "Submitted!";
    setTimeout(() => feedback.innerText = "", 2000);

    // ✅ Reset input fields to default
    document.getElementById("amount").value = "";
    document.getElementById("title").value = "";
    document.getElementById("payer").selectedIndex = 0;
    document.getElementById("exclude").checked = false;
    document.querySelectorAll('#group input').forEach(cb => cb.checked = false);

  } catch (error) {
    console.error(error);
    alert("Error submitting bill, check console for details.");
  }
}

// Load bills and calculate balances
async function loadBills() {
  const { data } = await db.from("bills").select("*");

  balances = {};
  people.forEach(p => balances[p] = 0);

  data.forEach(b => {
    const group = JSON.parse(b.split_group);
    const share = b.amount / group.length;
    group.forEach(p => {
      if (p !== b.payer) {
        balances[p] -= share;
        balances[b.payer] += share;
      }
    });
  });

  render();
}

function render() {
  let balHTML = "<strong>Balances:</strong><br>";
  for (let p in balances) {
    if (Math.abs(balances[p]) > 0.01) {
      balHTML += `${p}: SGD ${balances[p].toFixed(2)}<br>`;
    }
  }
  document.getElementById("balances").innerHTML = balHTML;
  settle();
}

// Simple settle-up logic
function settle() {
  let creditors=[], debtors=[];
  for (let p in balances) {
    let amt = balances[p];
    if (amt > 0) creditors.push({p, amt});
    if (amt < 0) debtors.push({p, amt});
  }

  let res = [];
  while (creditors.length && debtors.length) {
    let pay = Math.min(creditors[0].amt, -debtors[0].amt);
    res.push(`${debtors[0].p} → ${creditors[0].p}: SGD ${pay.toFixed(2)}`);
    creditors[0].amt -= pay;
    debtors[0].amt += pay;
    if (creditors[0].amt < 0.01) creditors.shift();
    if (debtors[0].amt > -0.01) debtors.shift();
  }

  document.getElementById("settle").innerHTML =
    "<strong>Settle Up:</strong><br>" + res.join("<br>");
}

// 🔥 REALTIME SYNC
db.channel('bills')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'bills' }, () => {
    loadBills();
  })
  .subscribe();

loadBills();
</script>
</div>
</body>
</html>
