<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {box-sizing: border-box;}
body {font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f7f7f7; display: flex; justify-content: center; padding: 15px; margin: 0;}
.card {background: white; padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.08);}
h2 {margin-top: 0; margin-bottom: 12px; font-size: 20px;}
h3 {font-size: 16px; margin: 10px 0;}
label {font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;}
.subtext {font-size: 12px; color: #777; margin-bottom: 10px;}
input, select {width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px;}
input:focus, select:focus {outline: none; border-color: #333; box-shadow: 0 0 5px rgba(0,0,0,0.1);}
.checkbox-group {margin-bottom: 12px;}
.checkbox-group label {display: flex; align-items: center; font-size: 14px; margin-bottom: 8px; cursor: pointer; font-weight: normal;}
.checkbox-group input {margin-right: 10px; width: auto; margin-bottom: 0;}
.select-all-btn {background: #f0f0f0; padding: 10px 12px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-size: 13px; margin-bottom: 10px; width: 100%; font-weight: 600;}
.select-all-btn:active {background: #e0e0e0;}
button {width: 100%; padding: 14px; border-radius: 10px; border: none; background: black; color: white; font-weight: bold; margin-top: 8px; cursor: pointer; font-size: 14px;}
button:active {background: #333;}
.btn-danger {background: #dc3545;}
.btn-danger:active {background: #c82333;}
.section {margin-top: 16px; font-size: 14px; line-height: 1.5;}
.status {padding: 12px; border-radius: 6px; margin-top: 10px; font-size: 12px; animation: slideIn 0.3s ease;}
.status.success {background: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
.status.error {background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}
.admin-section {margin-top: 20px; padding-top: 20px; border-top: 2px solid #ddd;}
@keyframes slideIn {from {opacity: 0; transform: translateY(-10px);} to {opacity: 1; transform: translateY(0);}}
@media (max-width: 480px) {
  body {padding: 10px;}
  .card {padding: 16px;}
  h2 {font-size: 18px; margin-bottom: 10px;}
  h3 {font-size: 14px;}
  label {font-size: 12px;}
  input, select {padding: 10px; font-size: 16px; margin-bottom: 10px;}
  button {padding: 12px; font-size: 13px; margin-top: 6px;}
  .select-all-btn {padding: 8px; font-size: 12px; margin-bottom: 8px;}
}
</style>
</head>
<body>
<div class="card">
<h2>💸 Split Bill</h2>

<label>Bill title</label>
<input type="text" id="title" placeholder="e.g., Lunch, Groceries">

<label>Amount (SGD)</label>
<div class="subtext">If you wish to log this expenditure in RMB as a placeholder, please annotate currency clearly (but please just try to log in SGD la!)</div>

<select id="paidBy" onchange="autoSelectPayer()"></select>

<label>Bill to</label>
<div class="subtext">Select everyone whom you want to bill to/split this bill with, please rem to check your own name if you are part of the sharing.</div>
<button class="select-all-btn" onclick="toggleSelectAll()">📋 Select All / Deselect All</button>
<div class="checkbox-group" id="billTo"></div>

<div class="checkbox-group">
<label><input type="checkbox" id="excludeSelf"> Exclude payer from split</label>
</div>

<button onclick="addBill()">Add Bill</button>
<button onclick="downloadHistoryLog()">📥 Download History Log</button>
<div id="status"></div>
<div class="section" id="latest"></div>

<div class="admin-section">
<h3>🔐 Admin Panel</h3>
<button class="btn-danger" onclick="promptAdminClearData()">🗑️ Clear All Data</button>
</div>

</div>

// Load bills from Supabase on startup
async function loadBillsFromSupabase() {
  try {
    const { data, error } = await supabase.from('bills').select('*').order('created_at', { ascending: true });
    if (error) throw error;
    bills = data || [];
    recalculateBalances();
    render();
  } catch (error) {
    console.error('Error loading bills:', error);
    showStatus('⚠️ Could not sync with cloud. Using local data.', 'error');
    loadFromLocalStorage();
  }
}

function recalculateBalances() {
  people.forEach(p => {balances[p] = 0;});
  bills.forEach(bill => {
    const share = bill.amount / bill.split_group.length;
    bill.split_group.forEach(person => {
      if (person !== bill.payer) {
        balances[person] -= share;
        balances[bill.payer] += share;
      }
    });
  });
}

function loadFromLocalStorage() {
  bills = JSON.parse(localStorage.getItem("bills")) || [];
  balances = JSON.parse(localStorage.getItem("balances")) || {};
  people.forEach(p => {if (!(p in balances)) balances[p] = 0;});
}

function autoSelectPayer() {const payer = document.getElementById("paidBy").value; document.querySelectorAll('#billTo input').forEach(cb => {if (cb.value === payer) cb.checked = true;});}
function toggleSelectAll() {const checkboxes = document.querySelectorAll('#billTo input'); const allChecked = Array.from(checkboxes).every(cb => cb.checked); checkboxes.forEach(cb => cb.checked = !allChecked);}
function showStatus(message, type = 'success') {const statusEl = document.getElementById('status'); statusEl.innerHTML = `<div class="status ${type}">${message}</div>`; setTimeout(() => {statusEl.innerHTML = '';}, 3000);}

  const payer = document.getElementById("paidBy").value;
  const excludeSelf = document.getElementById("excludeSelf").checked;
  const selected = Array.from(document.querySelectorAll('#billTo input:checked')).map(cb => cb.value);
  
  if (!amount || !payer || selected.length === 0) {showStatus("Fill all fields pls 🙃", 'error'); return;}
  
  let splitGroup = [...selected];
  if (excludeSelf) {splitGroup = splitGroup.filter(p => p !== payer);}

  const billData = {title: title, payer: payer, amount: amount, split_group: splitGroup, created_at: new Date().toISOString()};
  
  try {
    const { error } = await supabase.from('bills').insert([billData]);
    if (error) throw error;
    bills.push(billData);
    recalculateBalances();
    showStatus("✅ Bill added & synced!", 'success');
  } catch (error) {
    console.error('Error saving bill:', error);
    showStatus("✅ Bill added locally (sync pending)", 'success');
    bills.push(billData);
    recalculateBalances();
  }
  
  localStorage.setItem("bills", JSON.stringify(bills));
  localStorage.setItem("balances", JSON.stringify(balances));
  document.getElementById("amount").value = '';
  document.getElementById("title").value = '';
  document.getElementById("paidBy").value = '';
  document.querySelectorAll('#billTo input').forEach(cb => cb.checked = false);
  document.getElementById("excludeSelf").checked = false;
  render();
}

  document.getElementById("latest").innerHTML = `<strong>Latest:</strong><br>${last.title} — ${last.payer} paid SGD ${last.amount.toFixed(2)}`;
}
